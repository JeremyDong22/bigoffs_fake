<!-- 王琳 个人主页 - 示例模板 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>王琳 - BIGOFFS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: #f5f0eb;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8a87c, #d9735b);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 900; color: #fff;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.5rem; color: #4a3728; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; color: #7a6555; max-width: 400px; text-align: center; line-height: 1.6; }
    .back { margin-top: 2rem; color: #d9735b; text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="avatar">王</div>
  <h1>王琳</h1>
  <p>大家好，我是王琳。这是我的个人介绍页面，期待与大家合作！</p>
  <a class="back" href="/">← 返回首页</a>
</body>
</html>
