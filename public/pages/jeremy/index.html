<!--
  Jeremy's redirect page - v1.0
  Displays a styled preview card when embedded in iframe,
  redirects to personal website when visited directly.
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeremy - Personal Website</title>
  <script>
    // Redirect to personal website when opened directly (not in iframe)
    if (window.top === window.self) {
      window.location.href = 'https://jeremydong22.github.io';
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f1f5f9;
      overflow: hidden;
    }

    .card {
      text-align: center;
      padding: 2rem;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }

    .name {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .role {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .link {
      display: inline-block;
      padding: 0.4rem 1.2rem;
      border-radius: 9999px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      font-size: 0.8rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">J</div>
    <p class="name">Jeremy Dong</p>
    <p class="role">点击查看个人网站 →</p>
    <a class="link" href="https://jeremydong22.github.io" target="_top">jeremydong22.github.io</a>
  </div>
</body>
</html>
