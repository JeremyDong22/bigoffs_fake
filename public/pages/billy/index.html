<!-- Billy 个人主页 - 示例模板 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billy - BIGOFFS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #1f6feb);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 900; color: #fff;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; opacity: 0.7; max-width: 400px; text-align: center; line-height: 1.6; }
    .back { margin-top: 2rem; color: #58a6ff; text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="avatar">B</div>
  <h1>Billy</h1>
  <p>Hey! I'm Billy, part of the BIGOFFS team. Welcome to my page!</p>
  <a class="back" href="/">← Back to home</a>
</body>
</html>
