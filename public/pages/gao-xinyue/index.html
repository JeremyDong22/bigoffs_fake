<!-- 高新越 个人主页 - 示例模板 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高新越 - BIGOFFS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #003399 0%, #0047CC 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #FFD700;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 900; color: #003399;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; opacity: 0.8; max-width: 400px; text-align: center; line-height: 1.6; }
    .back { margin-top: 2rem; color: #FFD700; text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="avatar">高</div>
  <h1>高新越</h1>
  <p>BIGOFFS 团队成员，这是我的个人主页。欢迎来到我的页面！</p>
  <a class="back" href="/">← 返回首页</a>
</body>
</html>
